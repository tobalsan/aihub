# Multi-container environment for sales-admin-renewals.
#
# `main` is the Harbor-managed agent container (built from ./Dockerfile,
# which FROMs aihub-eval-base). Harbor adds its own service definition
# for main; we only supply overrides here (depends_on, env, networks).
#
# `fake-cloudifi-admin` is the strategy-B HTTP sidecar stubbing the real
# Cloudi-Fi admin API. Built from examples/harbor/base/fakes/cloudifi-admin.
# Share this definition by copy-paste across tasks for now; consolidate
# into a reusable fragment once we have >3 tasks using it.

services:
  main:
    depends_on:
      fake-cloudifi-admin:
        condition: service_healthy
    environment:
      REQUESTY_API_KEY: ${REQUESTY_API_KEY:?REQUESTY_API_KEY must be set in the shell running harbor}
      # EVAL_NOW lives here (not [agent.env] in task.toml) because harbor's
      # task schema does not support [agent.env]. Setting it on the compose
      # service makes it globally inherited by all subprocesses in `main`.
      EVAL_NOW: "2026-04-06"
    networks:
      - sandbox
      - egress

  fake-cloudifi-admin:
    build:
      context: ../../../../base/fakes/cloudifi-admin
    expose:
      - "8080"
    environment:
      FAKE_CLOUDIFI_FIXTURES: /fixtures
    networks:
      - sandbox

networks:
  # Option A short-term plan: keep `sandbox` internal-only so `main`
  # can resolve + reach the fake-cloudifi-admin sidecar over compose
  # DNS, and add separate `egress` bridge access for real LLM API
  # calls to router.requesty.ai.
  sandbox:
    internal: true
  egress: {}
