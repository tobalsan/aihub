schema_version = "1.1"

[task]
name = "aihub/sales-admin-renewals"
description = "List customer companies with renewals in the next 30 days"
authors = [{ name = "AIHub evals", email = "evals@aihub.local" }]
keywords = ["sales-admin", "cloudifi-admin", "deterministic"]

[metadata]
wave = 0
category = "sales-admin"
aihub_agent = "sally"
difficulty_explanation = "Read-only, deterministic filter + sort over fixture data"

[verifier]
timeout_sec = 120.0

[verifier.env]
EVAL_NOW = "2026-04-06"

[agent]
timeout_sec = 300.0
user = "agent"
# Note: harbor's task schema does NOT support [agent.env]. EVAL_NOW for
# the agent is injected via environment/docker-compose.yaml (service env),
# where it propagates to all subprocesses. Verifier env is separate and
# lives under [verifier.env] above.

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 4096
# allow_internet=true is required for sidecar reachability. Harbor's
# allow_internet=false injects `network_mode: none` on `main`, which is
# mutually exclusive with attaching to any compose network. Sandbox is
# enforced instead via an `internal: true` bridge network in
# environment/docker-compose.yaml — main has no route to the outside,
# only to the fake-cloudifi-admin sidecar.
allow_internet = true

[environment.env]
REQUESTY_API_KEY = "${REQUESTY_API_KEY}"
