schema_version = "1.1"

[task]
name = "aihub/sales-admin-quota-analysis"
description = "Identify companies approaching or exceeding their quota limits"
authors = [{ name = "AIHub evals", email = "evals@aihub.local" }]
keywords = ["sales-admin", "cloudifi-admin", "deterministic"]

[metadata]
wave = 0
category = "sales-admin"
aihub_agent = "sally"
difficulty_explanation = "Read-only, deterministic join of companies + quota data, threshold filter"

[verifier]
timeout_sec = 120.0

[verifier.env]
EVAL_NOW = "2026-04-06"

[agent]
timeout_sec = 300.0
user = "agent"
# EVAL_NOW for the agent is injected via environment/docker-compose.yaml.

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 4096
allow_internet = true

[environment.env]
REQUESTY_API_KEY = "${REQUESTY_API_KEY}"
