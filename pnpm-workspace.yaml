packages:
  - "apps/*"
  - "container/*"
  - "packages/*"
  - "packages/extensions/*"
allowBuilds:
  '@google/genai': true
  better-sqlite3: true
  esbuild: true
  koffi: true
  protobufjs: true
minimumReleaseAgeExclude:
