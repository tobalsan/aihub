<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>AIHub</title>
    <script>
      var t = localStorage.getItem('aihub-theme');
      if (!t) t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', t);
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-base: #0a0a0a;
        --bg-surface: #1a1a1a;
        --bg-raised: #242424;
        --bg-overlay: #111722;
        --bg-inset: #0c0e12;
        --bg-input: #131821;
        --border-default: #2a2a2a;
        --border-subtle: #1f2937;
        --text-primary: #ffffff;
        --text-secondary: #b6b6b6;
        --text-tertiary: #888888;
        --text-muted: #666666;
        --shadow-md: rgba(0,0,0,0.35);
        --scrollbar-thumb: #333;
        --mix-board-bg: #0c0e12;
        --mix-col-bg: #1d2430;
        --mix-col-border: #2a3240;
        --mix-hover-bg: #1a2330;
        --mix-hover-border: #3a4250;
        --mix-input-bg: #141b26;
        --mix-modal-bg: #151c26;
        --mix-modal-header-bg: #101722;
        --mix-modal-border: #273042;
        --tone-user: #d0ebe0;
        --tone-live: #e8f0ff;
        --tone-error: #f5b0b0;
        --subagent-bg: rgba(124, 58, 237, 0.06);
        --subagent-border: rgba(124, 58, 237, 0.4);
        --subagent-text: #c4b5fd;
      }

      [data-theme="light"] {
        --bg-base: #f5f5f5;
        --bg-surface: #ffffff;
        --bg-raised: #ebebeb;
        --bg-overlay: #ffffff;
        --bg-inset: #eef0f2;
        --bg-input: #ffffff;
        --border-default: #d4d4d4;
        --border-subtle: #e5e7eb;
        --text-primary: #111827;
        --text-secondary: #4b5563;
        --text-tertiary: #6b7280;
        --text-muted: #9ca3af;
        --shadow-md: rgba(0,0,0,0.08);
        --scrollbar-thumb: #c1c1c1;
        --mix-board-bg: #eef0f2;
        --mix-col-bg: #f7f8fa;
        --mix-col-border: #dde1e7;
        --mix-hover-bg: #f0f1f4;
        --mix-hover-border: #c8cdd4;
        --mix-input-bg: #ffffff;
        --mix-modal-bg: #f8f9fa;
        --mix-modal-header-bg: #f0f1f4;
        --mix-modal-border: #d4d8de;
        --tone-user: #065f46;
        --tone-live: #1e3a5f;
        --tone-error: #991b1b;
        --subagent-bg: rgba(124, 58, 237, 0.04);
        --subagent-border: rgba(124, 58, 237, 0.3);
        --subagent-text: #6d28d9;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html, body {
        height: 100%;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: var(--bg-base);
        color: var(--text-primary);
      }
      #root {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
